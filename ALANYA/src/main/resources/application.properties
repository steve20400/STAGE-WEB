spring.application.name=alanya-backend
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# Profil actif (dev par defaut). En prod : SPRING_PROFILES_ACTIVE=prod
# "local" est inclus pour charger application-local.properties (mot de passe MySQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev,local}

# Base de donnees : valeurs surchargees par les variables d'environnement
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/alanya_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate : 'validate' = ne touche pas au schema, verifie juste qu'il colle aux entites.
# Le schema est cree par Flyway via V1__init.sql.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway : gere les migrations SQL dans db/migration/
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT : OBLIGATOIREMENT via variable d'environnement en prod
jwt.secret=${JWT_SECRET:changeMeInProductionMinimum32CharactersLong!!}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}
