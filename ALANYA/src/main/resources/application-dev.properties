# Profil DEV : utilise localement
# Ces valeurs sont commitees dans Git (pas de secrets reels ici).
# Le vrai mot de passe doit etre dans .env ou variable systeme.

spring.jpa.show-sql=true

# Logs detailles
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.alanya=DEBUG

# JWT (dev seulement, jamais en prod)
jwt.secret=devSecretKeyNotForProductionAtLeast32CharsLong!!
# 7 jours en dev pour eviter les deconnexions pendant les tests
jwt.expiration=604800000
jwt.refreshExpiration=2592000000
